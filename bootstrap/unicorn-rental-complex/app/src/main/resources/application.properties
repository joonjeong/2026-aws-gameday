spring.application.name=unicorn-rental-complex
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/unicorn_rental}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.hikari.maximum-pool-size=10
spring.sql.init.mode=always
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
app.aws-region=${AWS_REGION:ap-northeast-2}
app.session-table-name=${SESSION_TABLE_NAME:unicorn-rental-sessions}
app.session-ttl-hours=${SESSION_TTL_HOURS:8}
